{{- if and .Values.proxyState.persistence.enabled (not .Values.proxyState.persistence.allowSharedState) (or (and .Values.autoscaling.enabled (gt (int .Values.autoscaling.minReplicas) 1)) (and (not .Values.autoscaling.enabled) (gt (int .Values.replicaCount) 1))) }}
{{- fail "proxyState.persistence.enabled requires a single replica unless proxyState.persistence.allowSharedState=true" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claude-anthropic-proxy.fullname" . }}
  labels:
    {{- include "claude-anthropic-proxy.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "claude-anthropic-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "claude-anthropic-proxy.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "claude-anthropic-proxy.serviceAccountName" . }}
      {{- if or .Values.proxyState.persistence.enabled .Values.podSecurityContext }}
      securityContext:
        {{- if and .Values.proxyState.persistence.enabled (not (hasKey .Values.podSecurityContext "fsGroup")) }}
        fsGroup: 1000
        {{- end }}
        {{- with .Values.podSecurityContext }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ include "claude-anthropic-proxy.name" . }}
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            {{- range $name, $value := .Values.env }}
            - name: {{ $name }}
              value: {{ printf "%v" $value | quote }}
            {{- end }}
            {{- if .Values.proxyState.persistence.enabled }}
            - name: PROXY_STATE_FILE
              value: {{ printf "%s/%s" .Values.proxyState.mountPath .Values.proxyState.fileName | quote }}
            {{- end }}
            {{- if .Values.proxyApiKey.existingSecret }}
            - name: PROXY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.proxyApiKey.existingSecret }}
                  key: {{ .Values.proxyApiKey.existingSecretKey }}
            {{- else if ne (default "" .Values.proxyApiKey.value) "" }}
            - name: PROXY_API_KEY
              value: {{ .Values.proxyApiKey.value | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.proxyState.persistence.enabled (include "claude-anthropic-proxy.hasClaudeAuth" .) .Values.extraVolumeMounts }}
          volumeMounts:
            {{- if .Values.proxyState.persistence.enabled }}
            - name: proxy-state
              mountPath: {{ .Values.proxyState.mountPath }}
            {{- end }}
            {{- if include "claude-anthropic-proxy.hasClaudeAuth" . }}
            - name: claude-auth
              mountPath: {{ .Values.claudeAuth.mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or .Values.proxyState.persistence.enabled (include "claude-anthropic-proxy.hasClaudeAuth" .) .Values.extraVolumes }}
      volumes:
        {{- if .Values.proxyState.persistence.enabled }}
        - name: proxy-state
          persistentVolumeClaim:
            claimName: {{ include "claude-anthropic-proxy.proxyStateClaimName" . }}
        {{- end }}
        {{- if include "claude-anthropic-proxy.hasClaudeAuth" . }}
        - name: claude-auth
          secret:
            secretName: {{ include "claude-anthropic-proxy.authSecretName" . }}
            defaultMode: {{ .Values.claudeAuth.defaultMode }}
            {{- with .Values.claudeAuth.items }}
            items:
              {{- toYaml . | nindent 14 }}
            {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
