{{- $multiReplica := or (and .Values.autoscaling.enabled (gt (int .Values.autoscaling.minReplicas) 1)) (and (not .Values.autoscaling.enabled) (gt (int .Values.replicaCount) 1)) }}
{{- $hasRedisForAuthSync := or .Values.redis.enabled .Values.redis.external.existingSecret (hasKey .Values.env "REDIS_URL") }}
{{- if and .Values.proxyState.persistence.enabled (not .Values.proxyState.persistence.allowSharedState) $multiReplica }}
{{- fail "proxyState.persistence.enabled requires a single replica unless proxyState.persistence.allowSharedState=true" }}
{{- end }}
{{- if and (include "claude-anthropic-proxy.hasClaudeAuth" .) .Values.claudeAuth.writable .Values.claudeAuth.persistence.enabled $multiReplica }}
{{- fail "claudeAuth.persistence.enabled requires a single replica because Claude CLI auth files are writable state" }}
{{- end }}
{{- if and .Values.claudeAuth.redisSync.enabled (not $hasRedisForAuthSync) }}
{{- fail "claudeAuth.redisSync.enabled requires Redis. Enable redis.enabled, set redis.external.existingSecret, or set env.REDIS_URL" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claude-anthropic-proxy.fullname" . }}
  labels:
    {{- include "claude-anthropic-proxy.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "claude-anthropic-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "claude-anthropic-proxy.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      serviceAccountName: {{ include "claude-anthropic-proxy.serviceAccountName" . }}
      {{- if or .Values.proxyState.persistence.enabled (and (include "claude-anthropic-proxy.hasClaudeAuth" .) .Values.claudeAuth.writable) .Values.podSecurityContext }}
      securityContext:
        {{- if and (or .Values.proxyState.persistence.enabled (and (include "claude-anthropic-proxy.hasClaudeAuth" .) .Values.claudeAuth.writable)) (not (hasKey .Values.podSecurityContext "fsGroup")) }}
        fsGroup: 1000
        {{- end }}
        {{- with .Values.podSecurityContext }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- if and (include "claude-anthropic-proxy.hasClaudeAuth" .) .Values.claudeAuth.writable }}
      initContainers:
        - name: seed-claude-auth
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              target={{ .Values.claudeAuth.mountPath | quote }}
              seed={{ .Values.claudeAuth.seedMountPath | quote }}
              policy={{ default "ifEmpty" .Values.claudeAuth.seedPolicy | quote }}
              mkdir -p "$target"
              if [ "$policy" = "always" ] || [ ! -s "$target/.credentials.json" ]; then
                cp -a "$seed"/. "$target"/
              else
                [ -f "$target/settings.json" ] || cp -a "$seed/settings.json" "$target/settings.json" 2>/dev/null || true
              fi
              chmod -R u+rwX,go-rwx "$target" || true
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: claude-auth-seed
              mountPath: {{ .Values.claudeAuth.seedMountPath }}
              readOnly: true
            - name: claude-auth
              mountPath: {{ .Values.claudeAuth.mountPath }}
      {{- end }}
      containers:
        - name: {{ include "claude-anthropic-proxy.name" . }}
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            {{- range $name, $value := .Values.env }}
            - name: {{ $name }}
              value: {{ printf "%v" $value | quote }}
            {{- end }}
            {{- if and .Values.redis.enabled (not (hasKey .Values.env "REDIS_URL")) }}
            - name: REDIS_URL
              value: {{ printf "redis://%s:%v/0" (include "claude-anthropic-proxy.redisFullname" .) .Values.redis.service.port | quote }}
            {{- else if and (not .Values.redis.enabled) .Values.redis.external.existingSecret (not (hasKey .Values.env "REDIS_URL")) }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.external.existingSecret }}
                  key: {{ .Values.redis.external.existingSecretKey }}
            {{- end }}
            {{- if and .Values.redis.enabled (not (hasKey .Values.env "REDIS_KEY_PREFIX")) }}
            - name: REDIS_KEY_PREFIX
              value: {{ include "claude-anthropic-proxy.fullname" . | quote }}
            {{- end }}
            {{- if .Values.proxyState.persistence.enabled }}
            - name: PROXY_STATE_FILE
              value: {{ printf "%s/%s" .Values.proxyState.mountPath .Values.proxyState.fileName | quote }}
            {{- end }}
            {{- if and (include "claude-anthropic-proxy.hasClaudeAuth" .) (not (hasKey .Values.env "CLAUDE_AUTH_DIR")) }}
            - name: CLAUDE_AUTH_DIR
              value: {{ .Values.claudeAuth.mountPath | quote }}
            {{- end }}
            {{- if and .Values.claudeAuth.redisSync.enabled (not (hasKey .Values.env "CLAUDE_AUTH_REDIS_SYNC")) }}
            - name: CLAUDE_AUTH_REDIS_SYNC
              value: "true"
            {{- end }}
            {{- if .Values.proxyApiKey.existingSecret }}
            - name: PROXY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.proxyApiKey.existingSecret }}
                  key: {{ .Values.proxyApiKey.existingSecretKey }}
            {{- else if ne (default "" .Values.proxyApiKey.value) "" }}
            - name: PROXY_API_KEY
              value: {{ .Values.proxyApiKey.value | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.proxyState.persistence.enabled (include "claude-anthropic-proxy.hasClaudeAuth" .) .Values.extraVolumeMounts }}
          volumeMounts:
            {{- if .Values.proxyState.persistence.enabled }}
            - name: proxy-state
              mountPath: {{ .Values.proxyState.mountPath }}
            {{- end }}
            {{- if include "claude-anthropic-proxy.hasClaudeAuth" . }}
            - name: claude-auth
              mountPath: {{ .Values.claudeAuth.mountPath }}
              {{- if not .Values.claudeAuth.writable }}
              readOnly: true
              {{- end }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or .Values.proxyState.persistence.enabled (include "claude-anthropic-proxy.hasClaudeAuth" .) .Values.extraVolumes }}
      volumes:
        {{- if .Values.proxyState.persistence.enabled }}
        - name: proxy-state
          persistentVolumeClaim:
            claimName: {{ include "claude-anthropic-proxy.proxyStateClaimName" . }}
        {{- end }}
        {{- if include "claude-anthropic-proxy.hasClaudeAuth" . }}
        {{- if .Values.claudeAuth.writable }}
        - name: claude-auth-seed
          secret:
            secretName: {{ include "claude-anthropic-proxy.authSecretName" . }}
            defaultMode: {{ .Values.claudeAuth.defaultMode }}
            {{- with .Values.claudeAuth.items }}
            items:
              {{- toYaml . | nindent 14 }}
            {{- end }}
        - name: claude-auth
          {{- if .Values.claudeAuth.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "claude-anthropic-proxy.claudeAuthClaimName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- else }}
        - name: claude-auth
          secret:
            secretName: {{ include "claude-anthropic-proxy.authSecretName" . }}
            defaultMode: {{ .Values.claudeAuth.defaultMode }}
            {{- with .Values.claudeAuth.items }}
            items:
              {{- toYaml . | nindent 14 }}
            {{- end }}
        {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
