{{- if and .Values.claudeAuth.createSecret (not .Values.claudeAuth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claude-anthropic-proxy.authSecretName" . }}
  labels:
    {{- include "claude-anthropic-proxy.labels" . | nindent 4 }}
type: Opaque
stringData:
  credentials.json: |
{{- required "claudeAuth.inline.credentialsJson is required when claudeAuth.createSecret=true" .Values.claudeAuth.inline.credentialsJson | nindent 4 }}
  settings.json: |
{{- .Values.claudeAuth.inline.settingsJson | nindent 4 }}
  {{- range $name, $content := .Values.claudeAuth.inline.extraFiles }}
  {{ $name }}: |
{{ $content | nindent 4 }}
  {{- end }}
{{- end }}
