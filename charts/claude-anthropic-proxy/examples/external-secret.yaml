apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: claude-auth
  namespace: claude-proxy
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: claude-auth
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: credentials.json
      remoteRef:
        key: claude-proxy/claude-auth
        property: credentials.json
    - secretKey: settings.json
      remoteRef:
        key: claude-proxy/claude-auth
        property: settings.json
