replicaCount: 2

image:
  repository: ghcr.io/tkfka1/claude-proxy
  tag: "1.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

serviceAccount:
  automount: false

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: claude-anthropic-proxy
        app.kubernetes.io/instance: claude-proxy
      matchExpressions:
        - key: app.kubernetes.io/component
          operator: NotIn
          values:
            - redis

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: claude-anthropic-proxy
              app.kubernetes.io/instance: claude-proxy
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: NotIn
                values:
                  - redis
          topologyKey: kubernetes.io/hostname

terminationGracePeriodSeconds: 30

env:
  HOST: 0.0.0.0
  PORT: "8080"
  # Required at runtime: set WEB_PASSWORD or WEB_PASSWORD_HASH with --set,
  # extra values, or extraEnvFrom Secret before starting the pod.
  REQUEST_BODY_LIMIT_BYTES: "33554432"
  ENABLE_REQUEST_LOGGING: "false"
  MAX_CONCURRENT_MESSAGE_REQUESTS: "4"
  MAX_QUEUED_MESSAGE_REQUESTS: "16"
  MAX_MESSAGE_QUEUE_WAIT_MS: "30000"
  RECENT_LOG_LIMIT: "200"
  CLAUDE_REQUEST_TIMEOUT_MS: "300000"
  CLAUDE_STREAM_IDLE_TIMEOUT_MS: "60000"
  SHUTDOWN_GRACE_MS: "10000"
  CLAUDE_BIN: claude
  CLAUDE_DEFAULT_MODEL: sonnet
  CLAUDE_MODEL_MAP_JSON: '{"claude-sonnet-4-20250514":"sonnet","claude-opus-4-20250514":"opus","claude-haiku-4-5":"haiku"}'
  CLAUDE_EXTRA_ARGS_JSON: "[]"
  ALLOW_MISSING_API_KEY_HEADER: "false"
  REQUIRE_ANTHROPIC_VERSION: "true"
  DEFAULT_ANTHROPIC_VERSION: "2023-06-01"
  PROXY_API_KEY_GRACE_PERIOD_SECONDS: "300"
  PROXY_API_KEY_HISTORY_LIMIT: "5"
  SECURITY_HEADERS_ENABLED: "true"
  HSTS_ENABLED: "true"
  HSTS_MAX_AGE_SECONDS: "31536000"
  HSTS_INCLUDE_SUBDOMAINS: "false"

proxyState:
  persistence:
    enabled: false
    size: 1Gi

redis:
  enabled: true
  external:
    existingSecret: ""
    existingSecretKey: REDIS_URL
  persistence:
    enabled: true
    size: 1Gi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

claudeAuth:
  existingSecret: claude-auth
  redisSync:
    enabled: true
  persistence:
    enabled: false
    size: 1Gi
