replicaCount: 2

image:
  repository: ghcr.io/example/claude-anthropic-proxy
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

podDisruptionBudget:
  enabled: false

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

env:
  HOST: 0.0.0.0
  PORT: "8080"
  REQUEST_BODY_LIMIT_BYTES: "33554432"
  ENABLE_REQUEST_LOGGING: "true"
  CLAUDE_BIN: claude
  CLAUDE_DEFAULT_MODEL: sonnet
  CLAUDE_MODEL_MAP_JSON: '{"claude-sonnet-4-20250514":"sonnet","claude-opus-4-20250514":"opus","claude-haiku-4-5":"haiku"}'
  CLAUDE_EXTRA_ARGS_JSON: "[]"
  PROXY_API_KEY: "change-me"
  ALLOW_MISSING_API_KEY_HEADER: "false"
  REQUIRE_ANTHROPIC_VERSION: "true"
  DEFAULT_ANTHROPIC_VERSION: "2023-06-01"

claudeAuth:
  existingSecret: claude-auth
