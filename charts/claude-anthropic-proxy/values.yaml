replicaCount: 1

image:
  repository: claude-anthropic-proxy
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

proxyState:
  mountPath: /home/node/.local/state/claude-anthropic-proxy
  fileName: runtime-state.json
  persistence:
    enabled: false
    existingClaim: ""
    allowSharedState: false
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    annotations: {}

redis:
  enabled: false
  image:
    repository: redis
    tag: "7.4-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 6379
  persistence:
    enabled: true
    existingClaim: ""
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    annotations: {}
  resources: {}

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

containerPort: 8080

resources: {}

livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: null

nodeSelector: {}
tolerations: []
affinity: {}

extraVolumes: []
extraVolumeMounts: []

extraEnv: []
extraEnvFrom: []

env:
  HOST: 0.0.0.0
  PORT: "8080"
  REQUEST_BODY_LIMIT_BYTES: "33554432"
  ENABLE_REQUEST_LOGGING: "true"
  MAX_CONCURRENT_MESSAGE_REQUESTS: "4"
  MAX_QUEUED_MESSAGE_REQUESTS: "16"
  MAX_MESSAGE_QUEUE_WAIT_MS: "30000"
  RECENT_LOG_LIMIT: "200"
  REDIS_KEY_PREFIX: "claude-anthropic-proxy"
  CLAUDE_BIN: claude
  CLAUDE_DEFAULT_MODEL: sonnet
  CLAUDE_MODEL_MAP_JSON: ""
  CLAUDE_EXTRA_ARGS_JSON: "[]"
  ALLOW_MISSING_API_KEY_HEADER: "true"
  REQUIRE_ANTHROPIC_VERSION: "false"
  DEFAULT_ANTHROPIC_VERSION: "2023-06-01"

proxyApiKey:
  value: ""
  existingSecret: ""
  existingSecretKey: PROXY_API_KEY

claudeAuth:
  existingSecret: ""
  mountPath: /home/node/.claude
  defaultMode: 420
  items:
    - key: credentials.json
      path: .credentials.json
    - key: settings.json
      path: settings.json
  createSecret: false
  inline:
    credentialsJson: ""
    settingsJson: "{}"
    extraFiles: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: claude-proxy.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
