services:
  claude-anthropic-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-anthropic-proxy:local
    container_name: claude-anthropic-proxy
    restart: unless-stopped
    stop_grace_period: 15s
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      REDIS_URL: ${EXTERNAL_REDIS_URL:?Set EXTERNAL_REDIS_URL=redis://host:6379/0}
      REDIS_KEY_PREFIX: claude-anthropic-proxy
    volumes:
      - ${HOME}/.claude:/home/node/.claude:ro
