services:
  claude-anthropic-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-anthropic-proxy:local
    container_name: claude-anthropic-proxy
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 8080
    volumes:
      - ${HOME}/.claude:/home/node/.claude:ro
      - claude-proxy-state:/home/node/.local/state/claude-anthropic-proxy

volumes:
  claude-proxy-state:
