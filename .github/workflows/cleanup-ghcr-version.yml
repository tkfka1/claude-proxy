name: Cleanup GHCR version

on:
  workflow_dispatch:
    inputs:
      target_tag:
        description: GHCR tag to delete
        required: true
        default: v0.1.0

permissions:
  contents: read
  packages: write

jobs:
  delete-ghcr-version:
    runs-on: ubuntu-latest
    env:
      OWNER: ${{ github.repository_owner }}
      PACKAGE_NAME: claude-proxy
      TARGET_TAG: ${{ inputs.target_tag }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Delete GHCR package version(s) matching the requested tag
        run: |
          set -euo pipefail

          api="https://api.github.com/users/${OWNER}/packages/container/${PACKAGE_NAME}/versions?per_page=100"
          versions="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api")"

          ids="$(printf '%s' "$versions" | jq -r --arg tag "$TARGET_TAG" '
            .[]
            | select(any(.metadata.container.tags[]?; . == $tag))
            | .id
          ')"

          if [ -z "$ids" ]; then
            echo "No GHCR package versions found for tag ${TARGET_TAG}."
            exit 0
          fi

          while IFS= read -r id; do
            [ -n "$id" ] || continue
            echo "Deleting package version id=${id} for tag ${TARGET_TAG}"
            curl -fsSL -X DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/users/${OWNER}/packages/container/${PACKAGE_NAME}/versions/${id}"
            echo
          done <<< "$ids"
